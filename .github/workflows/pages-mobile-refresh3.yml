name: Update stock dashboard data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 0-8 * * 1-5"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare config
        run: |
          cp config.example.json config.json
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path("config.json")
          data = json.loads(path.read_text(encoding="utf-8"))
          data["quote_delay_seconds"] = 0
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Decrypt symbol master
        run: node scripts/decrypt_master.mjs
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Build data
        run: python scripts/build_cloud_data.py

      - name: Encrypt data
        run: node scripts/encrypt_cloud_data.mjs
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Save generated public data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/encrypted-data.json docs/.nojekyll
          git diff --cached --quiet || git commit -m "Update public stock dashboard data"
          git push || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
