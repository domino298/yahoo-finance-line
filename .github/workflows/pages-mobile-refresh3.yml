ame: Build encrypted stock dashboard mobile refresh 3

on:
  workflow_dispatch:
    schedule:
        - cron: "*/5 0-8 * * 1-5"

        permissions:
          contents: read
            pages: write
              id-token: write

              concurrency:
                group: pages
                  cancel-in-progress: false

                  jobs:
                    build:
                        runs-on: ubuntu-latest
                            steps:
                                  - name: Checkout
                                          uses: actions/checkout@v4

                                                - name: Set up Python
                                                        uses: actions/setup-python@v5
                                                                with:
                                                                          python-version: "3.11"

                                                                                - name: Set up Node
                                                                                        uses: actions/setup-node@v4
                                                                                                with:
                                                                                                          node-version: "20"
                                                                                                          
                                                                                                                - name: Prepare config
                                                                                                                        run: |
                                                                                                                                  cp config.example.json config.json
                                                                                                                                            python - <<'PY'
                                                                                                                                                      import json
                                                                                                                                                                from pathlib import Path
                                                                                                                                                                          p = Path("config.json")
                                                                                                                                                                                    data = json.loads(p.read_text(encoding="utf-8"))
                                                                                                                                                                                              data["quote_delay_seconds"] = 0
                                                                                                                                                                                                        p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
                                                                                                                                                                                                                  PY
                                                                                                                                                                                                                  
                                                                                                                                                                                                                        - name: Fix previous close calculation
                                                                                                                                                                                                                                run: |
                                                                                                                                                                                                                                          python - <<'PY'
                                                                                                                                                                                                                                                    from pathlib import Path
                                                                                                                                                                                                                                                              p = Path("app.py")
                                                                                                                                                                                                                                                                        s = p.read_text(encoding="utf-8")
                                                                                                                                                                                                                                                                                  old = "    if previous_close in (None, 0) and len(closes) >= 2:\n        previous_close = closes[-2]"
                                                                                                                                                                                                                                                                                            new = "    if len(closes) >= 2:\n        previous_close = closes[-2]"
                                                                                                                                                                                                                                                                                                      if old in s:
                                                                                                                                                                                                                                                                                                                    s = s.replace(old, new, 1)
                                                                                                                                                                                                                                                                                                                              p.write_text(s, encoding="utf-8")
                                                                                                                                                                                                                                                                                                                                        PY
                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                              - name: Decrypt symbol master
                                                                                                                                                                                                                                                                                                                                                      run: node scripts/decrypt_master.mjs
                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                        SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                              - name: Build data
                                                                                                                                                                                                                                                                                                                                                                                      run: python scripts/build_cloud_data.py
                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                            - name: Build site
                                                                                                                                                                                                                                                                                                                                                                                                    run: python scripts/build_cloud_site.py
                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                          - name: Clarify refresh status
                                                                                                                                                                                                                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                                                                                                                                                                                                                            python - <<'PY'
                                                                                                                                                                                                                                                                                                                                                                                                                                      from pathlib import Path
                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                p = Path("docs/index.html")
                                                                                                                                                                                                                                                                                                                                                                                                                                                          s = p.read_text(encoding="utf-8")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    s = s.replace("Yahoo\u304b\u3089\u66f4\u65b0\u4e2d:", "\u76f4\u63a5\u53d6\u5f97\u3092\u8a66\u884c\u4e2d:")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              s = s.replace("Yahoo\u76f4\u63a5\u53d6\u5f97\u4e0d\u53ef / \u516c\u958b\u6e08\u307f\u6700\u65b0:", "5\u5206\u81ea\u52d5\u66f4\u65b0\u30c7\u30fc\u30bf:")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        s = s.replace("\u66f4\u65b0\u4e2d", "\u516c\u958b\u6e08\u307f\u6700\u65b0\u30c7\u30fc\u30bf\u3092\u78ba\u8a8d\u4e2d")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  p.write_text(s, encoding="utf-8")
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            PY
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Encrypt data
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: node scripts/encrypt_cloud_data.mjs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Disable Jekyll
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: touch docs/.nojekyll
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Configure Pages
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        uses: actions/configure-pages@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Upload Pages artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/upload-pages-artifact@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        path: docs
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          deploy:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              environment:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: github-pages
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          url: ${{ steps.deployment.outputs.page_url }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  needs: build
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Deploy to GitHub Pages
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    id: deployment
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            uses: actions/deploy-pages@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
