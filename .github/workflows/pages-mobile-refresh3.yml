name: Build encrypted stock dashboard mobile refresh 3

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0-8 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare config
        run: cp config.example.json config.json

      - name: Speed up quote fetch
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path("config.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          data["quote_delay_seconds"] = 0
          p.write_text(json.dumps(data, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Fix previous close calculation
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("app.py")
          s = p.read_text(encoding="utf-8")
          old = "    if previous_close in (None, 0) and len(closes) >= 2:\n        previous_close = closes[-2]"
          new = "    if len(closes) >= 2:\n        previous_close = closes[-2]"
          if old in s:
              s = s.replace(old, new, 1)
          elif new not in s:
              raise SystemExit("previous close patch target not found")
          p.write_text(s, encoding="utf-8")
          PY

      - name: Decrypt symbol master
        run: node scripts/decrypt_master.mjs
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Build data
        run: python scripts/build_cloud_data.py

      - name: Build site
        run: python scripts/build_cloud_site.py

      - name: Repair display count
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path("docs/index.html")
          s = p.read_text(encoding="utf-8")
          start = '      gate: document.querySelector("#gate"),\n\n      if __name__ == "__main__":'
          end = '      app: document.querySelector("#app"),'
          i = s.find(start)
          j = s.find(end)
          if i != -1 and j != -1 and j > i:
              s = s[:i] + '      gate: document.querySelector("#gate"),\n      app: document.querySelector("#app"),' + s[j + len(end):]
          style = '<style>.summary .metric:first-child{display:none}.summary{grid-template-columns:repeat(2,minmax(0,1fr))}</style>'
          if style not in s:
              s = s.replace("</body>", style + "</body>")
          p.write_text(s, encoding="utf-8")
          PY

      - name: Apply mobile layout and refresh button
        run: |
          cat > /tmp/mobile_refresh_patch_ascii.py <<'PY'
          from pathlib import Path
          import re


          p = Path("docs/index.html")
          s = p.read_text(encoding="utf-8")

          if 'id="refreshButton"' in s:
              p.write_text(s, encoding="utf-8")
              raise SystemExit

          s = s.replace(
              '    .topbar { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }',
              '    .topbar { min-height: 72px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }\n'
              '    .top-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }',
          )

          media_start = s.find('    @media (max-width: 780px) {')
          media_end = s.find('    }\n  </style>', media_start)
          if media_start != -1 and media_end != -1:
              mobile_css = '''    @media (max-width: 780px) {
            .wrap { width: min(100vw - 16px, 1120px); }
            .topbar { align-items: flex-start; flex-direction: column; padding: 16px 0; gap: 10px; }
            .top-actions { width: 100%; justify-content: space-between; }
            h1 { font-size: 20px; }
            .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .gate-row { flex-direction: column; }
            .table-scroll { overflow-x: visible; }
            table { min-width: 0; table-layout: fixed; }
            th, td { padding: 10px 6px; font-size: 12px; line-height: 1.35; }
            th:nth-child(1), td:nth-child(1),
            th:nth-child(2), td:nth-child(2),
            th:nth-child(7), td:nth-child(7) { display: none; }
            th:nth-child(3), td:nth-child(3) { width: 42%; }
            th:nth-child(4), td:nth-child(4) { width: 20%; }
            th:nth-child(5), td:nth-child(5) { width: 18%; }
            th:nth-child(6), td:nth-child(6) { width: 20%; }
            td:nth-child(3) { word-break: keep-all; overflow-wrap: anywhere; }
          }
          '''
              s = s[:media_start] + mobile_css + s[media_end + len('    }\n'):]

          s = re.sub(
              r'      <div class="muted" id="statusText">.*?</div>',
              lambda _match: (
                  '      <div class="top-actions">\n'
                  '        <button id="refreshButton" type="button" disabled>&#26356;&#26032;</button>\n'
                  '        <div class="muted" id="statusText">&#12497;&#12473;&#12527;&#12540;&#12489;&#26410;&#20837;&#21147;</div>\n'
                  '      </div>'
              ),
              s,
              count=1,
          )
          s = s.replace(
              '      gateError: document.querySelector("#gateError"),\n      statusText: document.querySelector("#statusText"),',
              '      gateError: document.querySelector("#gateError"),\n'
              '      refreshButton: document.querySelector("#refreshButton"),\n'
              '      statusText: document.querySelector("#statusText"),',
          )
          s = s.replace(
              'const encrypted = await fetch("encrypted-data.json", { cache: "no-store" }).then((res) => res.json());',
              'const encrypted = await fetch("encrypted-data.json?v=" + Date.now(), { cache: "no-store" }).then((res) => res.json());',
          )
          s = s.replace(
              '''    function render() {
            renderTabs();
            renderRows();
          }''',
              '''    function render() {
            renderTabs();
            renderRows();
          }
          async function refreshData() {
            if (!els.password.value) return;
            const previousFilter = currentFilter;
            const previousPortfolioId = currentPortfolioId;
            els.refreshButton.disabled = true;
            els.statusText.textContent = "\\u66f4\\u65b0\\u4e2d";
            try {
              payload = await decryptData(els.password.value);
              buildRows();
              currentFilter = previousFilter || "portfolio";
              currentPortfolioId = (payload.portfolios || []).some((portfolio) => String(portfolio.id) === String(previousPortfolioId))
                ? previousPortfolioId
                : (payload.portfolios?.[0]?.id ?? null);
              els.statusText.textContent = "\\u6700\\u7d42\\u66f4\\u65b0: " + new Date(payload.generated_at).toLocaleString("ja-JP");
              render();
            } catch (error) {
              els.statusText.textContent = "\\u66f4\\u65b0\\u5931\\u6557";
            } finally {
              els.refreshButton.disabled = false;
            }
          }''',
          )
          s = s.replace(
              '      els.unlockButton.disabled = true;\n      els.gateError.hidden = true;',
              '      els.unlockButton.disabled = true;\n      els.gateError.hidden = true;\n      els.refreshButton.disabled = true;',
          )
          s = s.replace(
              '        els.app.hidden = false;\n        els.statusText.textContent',
              '        els.app.hidden = false;\n        els.refreshButton.disabled = false;\n        els.statusText.textContent',
          )
          s = s.replace(
              '    els.unlockButton.addEventListener("click", unlock);',
              '    els.unlockButton.addEventListener("click", unlock);\n    els.refreshButton.addEventListener("click", refreshData);',
          )

          p.write_text(s, encoding="utf-8")
          PY
          python /tmp/mobile_refresh_patch_ascii.py

      - name: Encrypt data
        run: node scripts/encrypt_cloud_data.mjs
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Disable old dashboard workflows
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          for workflow in \
            pages.yml \
            pages-auto-repair.yml \
            pages-chartfix.yml \
            pages-mobile-refresh.yml \
            pages-mobile-refresh2.yml \
            pages-nocount.yml \
            pages-nocount2.yml \
            pages-ratefix.yml \
            pages-ratefix2.yml \
            pages-ratefix-fast.yml \
            pages-repair.yml
          do
            curl -fsS -X PUT \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/actions/workflows/$workflow/disable" || true
          done

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
