name: Build encrypted stock dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "7 0-8 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare config
        run: cp config.example.json config.json

      - name: Decrypt symbol master
        run: node scripts/decrypt_master.mjs
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Build data
        run: python scripts/build_cloud_data.py

      - name: Build site
        run: python scripts/build_cloud_site.py

      - name: Encrypt data
        run: node scripts/encrypt_cloud_data.mjs
        env:
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
