name: Build encrypted stock dashboard no count

on:
  workflow_dispatch:

  permissions:
    contents: read
      pages: write
        id-token: write

        jobs:
          build:
              runs-on: ubuntu-latest
                  steps:
                        - uses: actions/checkout@v4
                              - uses: actions/setup-python@v5
                                      with:
                                                python-version: "3.11"
                                                      - uses: actions/setup-node@v4
                                                              with:
                                                                        node-version: "20"
                                                                              - run: cp config.example.json config.json
                                                                                    - run: node scripts/decrypt_master.mjs
                                                                                            env:
                                                                                                      SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
                                                                                                            - run: python scripts/build_cloud_data.py
                                                                                                                  - run: python scripts/build_cloud_site_nocount.py
                                                                                                                        - run: node scripts/encrypt_cloud_data.mjs
                                                                                                                                env:
                                                                                                                                          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
                                                                                                                                                - run: touch docs/.nojekyll
                                                                                                                                                      - uses: actions/configure-pages@v5
                                                                                                                                                            - uses: actions/upload-pages-artifact@v3
                                                                                                                                                                    with:
                                                                                                                                                                              path: docs
                                                                                                                                                                                deploy:
                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                        needs: build
                                                                                                                                                                                            environment:
                                                                                                                                                                                                  name: github-pages
                                                                                                                                                                                                        url: ${{ steps.deployment.outputs.page_url }}
                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                  - uses: actions/deploy-pages@v4
                                                                                                                                                                                                                          id: deployment
                                                                                                                                                                                                                          
